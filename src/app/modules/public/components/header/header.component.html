<header class="sticky top-0 z-50 w-full bg-white/95 backdrop-blur-sm border-b border-slate-200">
  <nav class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">

    <!-- Logo -->
    <a href="/" class="flex items-center gap-2">
      <span class="text-xl font-bold tracking-tight text-slate-900"
        style="font-size: 16px; letter-spacing: -0.5px;"
      >ORDAMY</span>
      <span class="text-slate-300">|</span>
      <span class="text-xs text-slate-400 tracking-wider" style="font-size: 10px; letter-spacing: 0.04em;"
      >by BIGSO</span>
    </a>

    <!-- CTAs Dinámicos -->
    <div class="hidden md:flex items-center gap-3">
      @for (cta of ctas; track cta.id) {
        @switch (cta.type) {
          @case ('button') {
            @switch (cta.variant) {
              @case ('primary') {
                <button 
                  (click)="onCtaClick(cta.id)"
                  class="px-4 py-2 bg-orange-600 text-white text-sm font-medium rounded-md hover:bg-orange-700 transition-colors shadow-sm"
                >
                  {{ cta.label }}
                </button>
              }
              @case ('secondary') {
                <button 
                  (click)="onCtaClick(cta.id)"
                  class="hidden sm:inline-flex items-center px-4 py-2 bg-slate-100 text-slate-700 text-sm font-medium rounded-md hover:bg-slate-200 transition-colors"
                >
                  {{ cta.label }}
                </button>
              }
              @case ('ghost') {
                <button 
                  (click)="onCtaClick(cta.id)"
                  class="hidden sm:inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors"
                  style="font-size: 13px;"
                >
                  {{ cta.label }}
                </button>
              }
              @default {
                <button 
                  (click)="onCtaClick(cta.id)"
                  class="px-4 py-2 bg-slate-900 text-white text-sm font-medium rounded-md hover:bg-slate-800 transition-colors"
                >
                  {{ cta.label }}
                </button>
              }
            }
          }
          @case ('label') {
            <span 
              [class.hidden]="cta.hidden"
              class="text-sm font-medium text-slate-500"
            >
              {{ cta.label }}
            </span>
          }
        }
      }
    </div>
  </nav>
</header>
