<!-- Main Container -->
<div class="min-h-screen flex flex-col bg-slate-50">

  <!-- Header Component -->
  <app-public-header 
    [ctas]="headerCtas"
    (ctaClick)="onHeaderCta($event)"></app-public-header>

  <!-- HERO SECTION -->
  <section class="flex flex-col justify-center"
    style="background-color: #fdf6ef; min-height: calc(100vh - 64px); padding-top: 60px; padding-bottom: 60px;">

    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">

      <div class="text-center">

        <!-- Logo Icon -->
        <div class="mx-auto mb-8 flex items-center justify-center">
          <img src="assets/ordamy_logo.png" alt="Ordamy Logo" class="h-16 mx-auto" />
        </div>

        <!-- Title H1 -->
        <h1 class="text-4xl font-bold text-slate-900 sm:text-5xl tracking-tight"
          style="letter-spacing: -0.02em; line-height: 1.1;">
          Encuentra tu proveedor
        </h1>

        <!-- Subtitle -->
        <p class="mx-auto mt-5 max-w-2xl text-lg text-slate-600" style="line-height: 1.6;">
          Consulta el estado de tus órdenes y mantente informado sobre tus servicios.
        </p>

        <!-- Search Card -->
        <div class="mt-8 bg-white rounded-xl border p-8 mx-auto max-w-xl"
          style="border-color: #e5ddd4; border-radius: 14px; box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);">

          <app-tenant-search placeholder="Busca por nombre del negocio..." [showFrequentSearches]="true"
            [frequentSearches]="frequentSearches" (tenantSelected)="onTenantSelected($event)"></app-tenant-search>

        </div>

        <!-- Support Text -->
        <p class="mt-6 text-sm" style="color: #9a9a9a;">
          ¿Necesitas ayuda?
          <a href="https://wa.me/573052215945" class="font-medium hover:underline" style="color: #e05a20;">Habla con
            soporte</a>
        </p>
      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <!-- FOOTER -->
  <app-public-footer variant="corporate" brandColor="#e05a20"></app-public-footer>

</div>
